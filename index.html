<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>切换账号</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="phone">

  <!-- 顶部 -->
  <div class="nav">
    <div class="back">‹</div>
    <div class="title">切换账号</div>
  </div>

  <!-- 卡片 -->
  <div class="card">

    <!-- 主账号 -->
    <div class="account">
      <div class="avatar" id="avatar"></div>

      <div class="info">
        <div class="row">
          <div class="name" id="name">圈圈公子</div>

          <div class="vip">
            <span class="vip-dot"></span>
            <span id="vipLevel">SVIP·金</span>
          </div>

          <div class="current">当前登录</div>
        </div>

        <div class="phone-text" id="phone">135****7103</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 添加账号（隐藏入口） -->
    <div class="add" onclick="openEditor()">
      <div class="add-icon">+</div>
      <div class="add-text">添加账号</div>
    </div>

  </div>

  <div class="tip">支持至多3个账号间切换</div>

</div>

<!-- 隐藏编辑面板 -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>账号设置</h3>

    <label>头像</label>
    <input type="file" id="avatarInput" accept="image/*">

    <label>昵称</label>
    <input type="text" id="nameInput">

    <label>VIP</label>
    <input type="text" id="vipInput">

    <label>手机号</label>
    <input type="text" id="phoneInput">

    <button onclick="save()">保存</button>
    <button class="cancel" onclick="closeEditor()">取消</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

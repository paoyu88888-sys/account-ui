<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 关键：让 iOS Safari 按设备宽度渲染，并允许安全区（即使你不做状态栏也更像） -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>切换账号</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- 顶部导航 -->
    <div class="nav">
      <button class="back" aria-label="返回">
        <!-- iOS 风格返回箭头 -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="title">切换账号</div>
    </div>

    <!-- 主卡片 -->
    <div class="card">
      <!-- 顶部账号行 -->
      <div class="account">
        <div class="avatar" id="avatar" role="img" aria-label="头像"></div>

        <div class="account-main">
          <div class="topline">
            <div class="name" id="name">圈屈公子</div>

            <div class="vip" id="vip">
              <span class="vip-coin" aria-hidden="true"></span>
              <span class="vip-text" id="vipText">SVIP·金</span>
            </div>

            <div class="current" id="current">当前登录</div>
          </div>

          <div class="phone" id="phone">135****7103</div>
        </div>
      </div>

      <!-- 分割线（注意：从文字区域开始，不从头像下开始） -->
      <div class="divider-wrap">
        <div class="divider"></div>
      </div>

      <!-- 添加账号：同时作为隐藏编辑入口 -->
      <button class="add" id="editEntry" type="button">
        <div class="add-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 5V19" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
            <path d="M5 12H19" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="add-text">添加账号</div>
      </button>
    </div>

    <div class="tip">支持至多3个账号间切换</div>
  </div>

  <!-- 隐藏编辑面板（底部弹层） -->
  <div class="sheet-mask" id="mask" hidden></div>

  <div class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet-handle" aria-hidden="true"></div>

    <div class="sheet-title">账号设置</div>

    <div class="form">
      <div class="form-row">
        <div class="label">头像</div>
        <div class="control">
          <label class="upload">
            <input type="file" id="avatarInput" accept="image/*" />
            <span>选择图片</span>
          </label>
          <button class="mini" id="clearAvatar" type="button">恢复默认</button>
        </div>
      </div>

      <div class="form-row">
        <div class="label">昵称</div>
        <div class="control">
          <input class="input" id="nameInput" placeholder="输入昵称" />
        </div>
      </div>

      <div class="form-row">
        <div class="label">VIP</div>
        <div class="control">
          <input class="input" id="vipInput" placeholder="例如：SVIP·金" />
        </div>
      </div>

      <div class="form-row">
        <div class="label">手机号</div>
        <div class="control">
          <input class="input" id="phoneInput" placeholder="例如：135****7103" />
        </div>
      </div>

      <div class="form-row">
        <div class="label">当前登录</div>
        <div class="control">
          <label class="toggle">
            <input type="checkbox" id="currentToggle" />
            <span class="toggle-ui"></span>
            <span class="toggle-text">显示</span>
          </label>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="saveBtn" type="button">保存</button>
        <button class="btn ghost" id="cancelBtn" type="button">取消</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
